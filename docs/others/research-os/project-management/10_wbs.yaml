project:
  id: iTenFs
  name: iTenFs
  description: 編集データの非破壊管理、永続化、表示、エクスポート対応
  version: 1

status_enum:
  - todo
  - doing
  - blocked
  - review
  - done

priority_enum:
  - high
  - medium
  - low

type_enum:
  - epic
  - task
  - review

wbs:
